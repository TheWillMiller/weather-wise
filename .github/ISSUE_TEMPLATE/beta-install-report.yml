name: Install / Runtime Report
description: Report a WeatherWise install, update, or runtime problem.
title: "[Install]: "
labels:
  - install-report
body:
  - type: input
    id: weatherwise_version
    attributes:
      label: WeatherWise version
      placeholder: v0.3.3
    validations:
      required: true
  - type: input
    id: home_assistant_version
    attributes:
      label: Home Assistant version
    validations:
      required: true
  - type: input
    id: hacs_version
    attributes:
      label: HACS version
    validations:
      required: false
  - type: dropdown
    id: install_method
    attributes:
      label: Install method
      options:
        - HACS custom repository
        - Manual local resource
        - CDN test resource
        - Other
    validations:
      required: true
  - type: input
    id: weather_entity
    attributes:
      label: Weather entity
      placeholder: weather.home
    validations:
      required: true
  - type: dropdown
    id: country
    attributes:
      label: Country / region
      options:
        - United States
        - Canada
        - United Kingdom
        - Australia
        - New Zealand
        - Europe
        - Global / other
    validations:
      required: true
  - type: dropdown
    id: radar_provider
    attributes:
      label: Radar provider
      options:
        - Auto
        - US NOAA radar
        - RainViewer global radar
        - No radar
    validations:
      required: true
  - type: input
    id: browser_device
    attributes:
      label: Browser/device
      placeholder: Chrome on Windows, Safari on iPhone, HA Companion App, etc.
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: What happened?
      options:
        - label: The card appeared in the card picker.
        - label: The visual editor opened.
        - label: Settings persisted after refresh.
        - label: Weather data loaded.
        - label: Forecast rows rendered.
        - label: Radar rendered.
        - label: Something is broken.
  - type: textarea
    id: details
    attributes:
      label: Details, screenshots, or console errors
      description: Paste browser console errors or attach screenshots if something broke. Outside the US, Canada, and UK, please include your weather provider, whether RainViewer radar loads, and any local radar or warning sources WeatherWise should support.
    validations:
      required: false
