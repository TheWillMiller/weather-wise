name: Feature Request
description: Suggest a focused WeatherWise improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Describe the workflow, region, provider, or setup issue this would improve.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like WeatherWise to do?
    validations:
      required: true
  - type: input
    id: weatherwise_version
    attributes:
      label: WeatherWise version
      placeholder: v0.2.0-beta.2
    validations:
      required: false
  - type: input
    id: region
    attributes:
      label: Region/provider
      placeholder: US NOAA / Canada / UK / RainViewer / etc.
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Extra context
      description: Screenshots, examples, or related apps/features are welcome.
    validations:
      required: false
